# Runs both services forever on the Raspberry Pi:
#   docker compose up -d --build
#   docker compose logs -f controller
# Web UI:  http://<raspberry-pi-ip>:8000
#
# Both use host networking: the controller needs it for Bluetooth + LAN UDP, and
# the web needs it so Gree discovery's UDP/7000 broadcast reaches the ACs.
services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: humctl-controller
    restart: unless-stopped
    network_mode: host
    environment:
      - SCHEDULE_TZ=Europe/Lisbon
      # Periods when the system is OFF (ACs forced off). Outside these, the
      # humidity automation runs. Comma-separated HH:MM-HH:MM ranges; add as
      # many as you like; windows may cross midnight (e.g. 22:00-10:00).
      - OFF_WEEKDAY=22:00-10:00
      - OFF_WEEKEND=22:00-11:00
      # Humidity thresholds (%RH): above ON -> Dry, at/below OFF -> Off.
      - HUMIDITY_ON=65
      - HUMIDITY_OFF=55
      # Daily hard shutdown: forces EVERY AC off once at this time (HH:MM),
      # overriding manual Cool/Heat — a backstop for units left on. Empty
      # disables it. Can also be changed live in the web UI (which wins).
      - FORCE_OFF_AT=02:00
    volumes:
      - data:/data
      # Talk to the host's BlueZ over D-Bus for Bluetooth scanning.
      - /run/dbus:/run/dbus:ro
    # Bluetooth scanning on the Pi needs broad device access; privileged is the
    # reliable option (cap_add NET_ADMIN/NET_RAW was not enough on Pi OS).
    privileged: true
    # Cap Docker's stdout capture so it can't fill the SD card (default is
    # unbounded). The decision log under /data has its own 7-day rotation.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: humctl-web
    restart: unless-stopped
    network_mode: host
    environment:
      # HTTP Basic auth for the web UI. Values come from a local .env file
      # (copy .env.example -> .env and set them). Leave unset to disable auth.
      # Note: Basic auth is not encrypted without HTTPS — fine on a trusted LAN.
      - WEB_USER=${WEB_USER:-}
      - WEB_PASSWORD=${WEB_PASSWORD:-}
    volumes:
      - data:/data
    depends_on:
      - controller
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
